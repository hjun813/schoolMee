services:
  db:
    image: postgres:15-alpine
    container_name: schoolmee-db
    environment:
      POSTGRES_DB: ${DB_NAME:-schoolmee}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-schoolmee}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./schoolMee-BE
      dockerfile: Dockerfile
    container_name: schoolmee-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-schoolmee}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      FILE_UPLOAD_DIR: /app/uploads
    volumes:
      - ./schoolMee-BE/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./schoolMee-FE
      dockerfile: Dockerfile
    container_name: schoolmee-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8080}
    depends_on:
      - backend

volumes:
  postgres_data:
