spring:
  application:
    name: schoolmee

  # DB 설정 (Docker가 없는 환경을 위해 H2 인메모리 DB를 기본으로 사용합니다)
  datasource:
    url: jdbc:h2:mem:schoolmee;DB_CLOSE_DELAY=-1
    username: sa
    password:
    
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: true
      # H2 사용 시 Dialect 설정
      dialect: org.hibernate.dialect.H2Dialect

  # 멀티파트 파일 업로드 제한 설정
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB      # 파일 1개 최대 크기
      max-request-size: 50MB   # 요청 전체 최대 크기

# Swagger UI: http://localhost:8080/swagger-ui/index.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

# 파일 저장 경로 (LocalFileStorageService에서 사용)
# S3로 전환 시 이 설정 제거 후 S3FileStorageService 빈 등록
file:
  upload-dir: uploads/photos

