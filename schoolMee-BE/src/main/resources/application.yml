spring:
  application:
    name: schoolmee

  # DB 설정 (Docker가 없는 환경을 위해 H2 인메모리 DB를 기본으로 사용합니다)
  datasource:
    url: jdbc:h2:mem:schoolmee;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
    
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: true
      # H2 사용 시 Dialect 설정
      dialect: org.hibernate.dialect.H2Dialect

# Swagger UI: http://localhost:8080/swagger-ui/index.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
